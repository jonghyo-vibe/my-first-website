<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var l = window.location;
    var segs = l.pathname.split('/').filter(Boolean);
    var keep = (segs[1] === 'my-portfolio' || segs[1] === 'mini_sns') ? 2 : 1;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/' + segs.slice(0, keep).join('/') + '/?/' +
      segs.slice(keep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
