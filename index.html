<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #1e293b; border-radius: 16px; padding: 48px 40px; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    .avatar { font-size: 72px; margin-bottom: 16px; }
    h1 { font-size: 2rem; color: #f8fafc; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: 1rem; margin-bottom: 32px; }
    .divider { border: none; border-top: 1px solid #334155; margin: 24px 0; }
    p { color: #cbd5e1; line-height: 1.8; font-size: 0.95rem; }
    .badge { display: inline-block; background: #3b82f6; color: #fff; border-radius: 20px; padding: 6px 16px; font-size: 0.85rem; margin-top: 24px; }
    @media (max-width: 480px) { .card { padding: 32px 24px; } h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요!</h1>
    <p class="subtitle">jonghyo-vibe의 첫 번째 웹사이트</p>
    <hr class="divider">
    <p>AI와 함께 만든 나의 첫 번째 웹페이지입니다.<br>앞으로 다양한 프로젝트를 이곳에 담아갈 예정입니다.</p>
    <span class="badge">🚀 GitHub Pages로 배포됨</span>
  </div>
</body>
</html>
